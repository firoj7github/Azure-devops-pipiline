# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE ONLY — do NOT store real secrets in Git.
# In production, use Azure Key Vault + CSI driver or Sealed Secrets.
#
# To create this secret manually:
#   kubectl create secret generic hydrus-db-secret \
#     --namespace hydrus \
#     --from-literal=DB_USER=hydrus \
#     --from-literal=DB_PASSWORD='<your-password>'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: hydrus-db-secret
  namespace: hydrus
type: Opaque
data:
  # base64-encoded values (echo -n 'value' | base64)
  DB_USER: aHlkcnVz         # hydrus
  DB_PASSWORD: CHANGEME==   # REPLACE with real base64 value